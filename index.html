<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%234aa3ff;stop-opacity:1' /><stop offset='100%' style='stop-color:%23ff00d4;stop-opacity:1' /></linearGradient></defs><rect width='100' height='100' rx='20' fill='%2305060a'/><path d='M30 40 L50 60 L70 40' stroke='url(%23g)' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='50' cy='75' r='8' fill='%232fdc9c'/></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOBIRUDO Dashboard Gamer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Chiller&family=Mountains+of+Christmas&family=Dancing+Script:wght@400;700&family=Kaushan+Script:wght@400;700&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;700&family=Exo+2:wght@400;700&family=Roboto:wght@400;700&family=Fredoka+One&family=Comic+Neue:wght@400;700&family=Bebas+Neue&family=Oswald:wght@400;700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Menu Hambúrguer Mobile -->
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <div class="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </button>
    
    <!-- Overlay Mobile -->
    <div class="nav-overlay" id="nav-overlay" onclick="toggleMobileMenu()"></div>
    
    <div class="dash-wrapper">
        <header class="header">
            <div class="brand">
                <span class="brand-main">GOBIRUDO</span>
                <span class="brand-sub">DASHBOARD GAMER</span>
            </div>
            
            <!-- Header Bar with Navigation, Player and Themes -->
            <div class="header-bar">
                <!-- Navigation -->
                <nav class="nav">
                    <button class="nav-btn active" data-page="dash">Dashboard</button>
                    <button class="nav-btn" data-page="zerados">Meus Zerados</button>
                    <button class="nav-btn" data-page="wishlist">Minha Wishlist</button>
                    <button class="nav-btn" data-page="dropados">Games Dropados</button>
                </nav>
                
                <!-- Audio Player Gamer -->
                <div class="audio-player">
                    <button class="audio-btn" id="play-pause-btn" onclick="toggleAudio()">
                        <span class="audio-icon">play</span>
                    </button>
                    <select class="track-selector" id="track-selector" onchange="changeTrack()">
                        <option value="lofi">Lo-Fi Vibes</option>
                        <option value="synth">Synthwave</option>
                        <option value="chill">Chill Gaming</option>
                        <option value="rock">Rock'n'Roll</option>
                        <option value="electronic">Electronic</option>
                        <option value="ambient">Ambient</option>
                        <option value="retro">Retro Gaming</option>
                        <option value="battle">Battle Mode</option>
                    </select>
                    <div class="audio-visualizer">
                        <span class="audio-bar"></span>
                        <span class="audio-bar"></span>
                        <span class="audio-bar"></span>
                        <span class="audio-bar"></span>
                    </div>
                </div>
                
                <!-- Theme Button -->
                <button class="theme-toggle-btn" onclick="cycleTheme()" title="Mudar Tema">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7V12C2 16.5 4.23 20.68 7.62 23.15L12 24L16.38 23.15C19.77 20.68 22 16.5 22 12V7L12 2Z" fill="currentColor" opacity="0.3"/>
                        <path d="M12 2L2 7V12C2 16.5 4.23 20.68 7.62 23.15L12 24L16.38 23.15C19.77 20.68 22 16.5 22 12V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="3" fill="currentColor"/>
                        <path d="M12 9C13.66 9 15 10.34 15 12C15 13.66 13.66 15 12 15C10.34 15 9 13.66 9 12C9 10.34 10.34 9 12 9Z" fill="currentColor" opacity="0.5"/>
                    </svg>
                </button>
                
                <!-- Status Online -->
                <span id="admin-trigger" class="status-dot" onclick="window.location.href=window.location.pathname.includes('admin.html') ? 'index.html' : 'login.html'">ONLINE</span>
            </div>
        </header>

        <div id="filter-bar" class="filter-container" style="display: none;">
            <input type="text" id="search-input" placeholder="Pesquisar título...">
            <select id="platform-filter"><option value="all">Todas Plataformas</option></select>
            <select id="sort-select">
                <option value="az">A-Z</option>
                <option value="za">Z-A</option>
                <option value="nota-desc">Melhores Notas</option>
                <option value="nota-asc">Piores Notas</option>
            </select>
        </div>

        <main id="content-area" class="main-layout dash-mode"></main>
    </div>

    <!-- Footer AI Credits -->
    <footer class="ai-footer">
        <div class="ai-footer-content">
            <div class="ai-logo">
                <span class="ai-icon">AI</span>
                <span class="ai-text">GOBIRUDO</span>
            </div>
            <div class="ai-credits">
                <span class="ai-tag">Powered by AI Technologies</span>
                <span class="ai-support">Intelligent Support System</span>
            </div>
            <div class="ai-year">© 2026</div>
        </div>
    </footer>

    <div id="modal-form" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon-blue); margin-bottom:20px; text-align:center; font-size:0.9rem; letter-spacing:2px">GERENCIAR JOGO</h3>
            <form id="game-form">
                <input type="hidden" id="current-page-type">
                <input type="hidden" id="edit-index">
                <div class="input-group"><label>Nome do Jogo</label><input type="text" id="form-game" required></div>
                <div class="input-group"><label>URL da Capa</label><input type="text" id="form-img"></div>
                <div class="input-group"><label>Plataforma (PC, PS5, etc)</label><input type="text" id="form-extra"></div>
                <div class="input-group"><label>Gênero</label><input type="text" id="form-genero"></div>
                <div class="input-group"><label>Tempo de Jogo (Apenas número)</label><input type="text" id="form-horas"></div>
                <div class="input-group"><label>Nota (0-10) ou % Desejo</label><input type="text" id="form-nota" required></div>
                <div class="input-group"><label>Review Pessoal</label><textarea id="form-review" rows="3" placeholder="Seus pensamentos sobre este jogo..."></textarea></div>
                <div class="input-group"><label>Tags Personalizadas</label><input type="text" id="form-tags" placeholder="Ex: Replayável, Indicado por amigos, Multiplayer"></div>
                <div class="input-group"><label>Avaliação em Estrelas</label>
                    <div class="star-rating" id="star-rating">
                        <span class="star" data-rating="1">&#9733;</span>
                        <span class="star" data-rating="2">&#9733;</span>
                        <span class="star" data-rating="3">&#9733;</span>
                        <span class="star" data-rating="4">&#9733;</span>
                        <span class="star" data-rating="5">&#9733;</span>
                    </div>
                    <input type="hidden" id="form-stars" value="0">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="closeModal()" class="backup-btn" style="flex:1">CANCELAR</button>
                    <button type="submit" class="backup-btn" style="flex:1; background:var(--neon-blue); color:#000">SALVAR</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>

    <!-- Modal de Comentários -->
    <div id="comment-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <h3 style="color:var(--neon-blue); margin-bottom:15px; text-align:center;">COMENTÁRIO</h3>
            <div id="comment-content" style="padding:15px; background:rgba(0,0,0,0.3); border-radius:8px; margin-bottom:15px; min-height:60px; color:var(--text);"></div>
            <button onclick="closeCommentModal()" class="backup-btn" style="width:100%; background:var(--neon-blue); color:#000;">FECHAR</button>
        </div>
    </div>

    <!-- Modal de Finalizar Jogo -->
    <div id="finish-game-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <h3 style="color:var(--neon-green); margin-bottom:15px; text-align:center;">FINALIZAR JOGO</h3>
            <p style="text-align:center; margin-bottom:20px; color:var(--text);">Deseja mover para zerados ou dropados?</p>
            <div style="display:flex; gap:10px;">
                <button onclick="moveGame('zerados')" class="backup-btn" style="flex:1; background:var(--neon-green); color:#000;">ZERADOS</button>
                <button onclick="moveGame('dropados')" class="backup-btn" style="flex:1; background:#ff4a4a; color:#fff;">DROPADOS</button>
                <button onclick="closeFinishGameModal()" class="backup-btn" style="flex:1;">CANCELAR</button>
            </div>
        </div>
    </div>

</body>
</html>
