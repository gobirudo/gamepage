<!DOCTYPE html>
<html lang="pt-br">
<head>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%234aa3ff;stop-opacity:1' /><stop offset='100%' style='stop-color:%23ff00d4;stop-opacity:1' /></linearGradient></defs><rect width='100' height='100' rx='20' fill='%2305060a'/><path d='M30 40 L50 60 L70 40' stroke='url(%23g)' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='50' cy='75' r='8' fill='%232fdc9c'/></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gobirudo - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box {
            background: rgba(10, 10, 15, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 5px; margin-top: 5px; outline: none; }
        input:focus { border-color: var(--neon-blue); }
    </style>
</head>
<body>
    <div class="dash-wrapper login-container">
        <div class="login-box">
            <div class="brand" style="margin-bottom: 30px;">
                <span class="brand-main">ACESSO</span>
                <span class="brand-sub">RESTRITO ADMIN</span>
            </div>
            
            <form id="login-form">
                <div class="input-group" style="text-align: left; margin-bottom: 15px;">
                    <label style="font-size: 0.7rem; color: var(--text-dim);">USUÁRIO</label>
                    <input type="text" id="user" required autocomplete="username">
                </div>
                <div class="input-group" style="text-align: left; margin-bottom: 15px;">
                    <label style="font-size: 0.7rem; color: var(--text-dim);">SENHA</label>
                    <input type="password" id="pass" required autocomplete="current-password">
                </div>
                <button type="submit" class="backup-btn" style="width:100%; margin-top:10px; background:var(--neon-blue); color:#000; font-weight: 900; cursor: pointer;">ENTRAR</button>
                <p id="error-msg" style="color: #ff4a4a; font-size: 0.7rem; margin-top: 15px; display: none;">❌ Acesso negado!</p>
            </form>
            <button onclick="window.location.href='index.html'" class="nav-btn" style="margin-top: 20px; font-size: 0.6rem; opacity: 0.5; background: none; border: none; color: white; cursor: pointer;">VOLTAR</button>
        </div>
    </div>

    <script>
        // Aqui a senha está codificada. Se o cara inspecionar, não lê de cara.
        const _u = "Z29iaXJ1ZG8="; // gobirudo
        const _p = "I0dvYmlydWRvQDIwMjY="; // #Gobirudo@2026
        const _u2 = "cHVsdGFuYQ=="; // pultana
        const _p2 = "I1B1bHRhbmFAMjAyNg=="; // #Pultana@2026

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const u = btoa(document.getElementById('user').value);
            const p = btoa(document.getElementById('pass').value);
            const err = document.getElementById('error-msg');

            if ((u === _u && p === _p) || (u === _u2 && p === _p2)) {
                // Se o login estiver certo, salva um "token" temporário na sessão do navegador
                sessionStorage.setItem('gobirudo_auth', 'true');
                window.location.href = 'admin.html';
            } else {
                err.style.display = 'block';
                setTimeout(() => { err.style.display = 'none'; }, 3000);
            }
        };
    </script>
</body>
</html>
